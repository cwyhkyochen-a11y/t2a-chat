<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" href="data:,">
<title>Chat Widget</title>
<link rel="stylesheet" href="widget-chat.css">
</head>
<body>
<div class="widget-app">
  <!-- Header -->
  <div class="widget-header">
    <div class="header-left">
      <button class="conv-dropdown-btn" id="convDropdownBtn">
        <span id="convTitle">New Chat</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="taskListBtn" title="Tasks">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.6 9a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 3a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.17.38.27.8.27 1.23V12"/></svg>
      </button>
    </div>
  </div>

  <!-- Conv Dropdown -->
  <div class="conv-dropdown hidden" id="convDropdown">
    <div class="conv-dropdown-header">
      <span>Conversations</span>
      <button class="new-conv-btn" id="newConvBtn">+ New</button>
    </div>
    <div class="conv-dropdown-list" id="convList"></div>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messagesArea"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="msgInput" rows="1" placeholder="Type a message..."></textarea>
    <button class="send-btn" id="sendBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <!-- Overlay panels -->
  <div class="panel-overlay hidden" id="panelOverlay"></div>
  <div class="side-panel hidden" id="taskPanel"><div class="panel-header"><span>Tasks</span><button class="panel-close" id="taskPanelClose">&times;</button></div><div class="panel-body" id="taskPanelBody"></div></div>
  <div class="side-panel hidden" id="settingsPanel"><div class="panel-header"><span>Settings</span><button class="panel-close" id="settingsPanelClose">&times;</button></div><div class="panel-body" id="settingsPanelBody"></div></div>
</div>
<script src="widget-chat.js"></script>
</body>
</html>
